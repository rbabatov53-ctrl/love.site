<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sabina 💗</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }

    .center-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: pink;
        font-size: 48px;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 0 20px hotpink, 0 0 40px deeppink;
        z-index: 10;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-50%, -50%) scale(1.1); }
        100% { transform: translate(-50%, -50%) scale(1); }
    }

    .tap {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: pink;
        opacity: 0.7;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="center-text">
    Sabina 💗<br>
    I love you
</div>

<div class="tap">Нажми на экран 💕</div>

<canvas id="canvas"></canvas>

<!-- 🎶 МУЗЫКА -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-background-112191.mp3" type="audio/mp3">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== Музыка (для iPhone нужен тап) =====
document.body.addEventListener("click", () => {
    music.play();
});

// ===== Падающий текст =====
let texts = [];

for (let i = 0; i < 120; i++) {
    texts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        speed: 1 + Math.random() * 2
    });
}

// ===== Салют =====
let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: x,
            y: y,
            angle: Math.random() * Math.PI * 2,
            speed: Math.random() * 5 + 1,
            life: 100
        });
    }
}

setInterval(() => {
    createFirework(
        Math.random() * canvas.width,
        Math.random() * canvas.height / 2
    );
}, 1200);

// ===== Анимация =====
function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // текст
    ctx.fillStyle = "pink";
    ctx.font = "16px Arial";

    texts.forEach(t => {
        ctx.fillText("my love", t.x, t.y);
        t.y += t.speed;

        if (t.y > canvas.height) {
            t.y = 0;
            t.x = Math.random() * canvas.width;
        }
    });

    // частицы
    particles.forEach((p, index) => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.life--;

        ctx.fillStyle = "hotpink";
        ctx.fillRect(p.x, p.y, 2, 2);

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
